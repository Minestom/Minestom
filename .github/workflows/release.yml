name: Release
on:
  workflow_dispatch: { }
permissions:
  contents: write # Required to create tags
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with: # We have to fetch full history because we need old tags
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Tracing Agent # There is a slight race that we have to solve by rerunning
        run: ./gradlew -Pagent test

      - name: Copy Reachability Metadata
        run: ./gradlew metadataCopy

      - name: Verify Metadata
        run: |
          if ! git diff --quiet src/main/resources/META-INF/native-image; then
            echo "Reachability metadata generated during the release build does not match the committed files in the repository."
          else
            echo "Reachability metadata is fully synchronized."
          fi

      - name: Gradle pre-run
        run: ./gradlew determineMinecraftVersion --no-configuration-cache
      - id: version
        name: Determine Version
        run: |
          DATE=$(date +'%Y.%m.%d')
          MC_VERSION=$(./gradlew determineMinecraftVersion --quiet --console=plain --no-configuration-cache)

          TAGS=$(git tag --list "${DATE}*")
          echo "Existing tags: $TAGS"
          
          if [ -z "$TAGS" ]; then
            VERSION="$DATE-$MC_VERSION"
          else
            SUFFIXES=$(echo "$TAGS" | sed -n "s/^$DATE\([a-z]\)\-.*$/\1/p")
            NEXT_SUFFIX="b"
            if [ -n "$SUFFIXES" ]; then
              LAST_SUFFIX=$(echo "$SUFFIXES" | sort | tail -n1)
              NEXT_SUFFIX=$(printf "\\$(printf '%03o' $(( $(printf '%d' "'$LAST_SUFFIX") + 1 )) )")
            fi
            VERSION="${DATE}${NEXT_SUFFIX}-$MC_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Build javadoc
        run: ./gradlew javadoc
        env:
          MINESTOM_VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to Maven Central
        if: github.repository == 'Minestom/Minestom'
        run: ./gradlew publishAggregationToCentralPortal
        env:
          MINESTOM_VERSION: ${{ steps.version.outputs.version }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}

      - name: Deploy javadoc to its assigned branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: javadoc
          FOLDER: build/docs/javadoc
          SKIP_EMPTY_COMMITS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEAR_GLOBS_FILE: ".github/javadoc-publish-clear"

      - name: Create Tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
