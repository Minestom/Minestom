name: Build PR

on:
  pull_request:
    branches: [ master ]
    types: [ opened, reopened, synchronize, labeled, unlabeled ]
  merge_group:
    types: [ checks_requested ]

permissions:
  contents: read

concurrency:
  group: build-pr-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: JVM Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name != 'pull_request' || github.repository_owner != github.event.pull_request.head.repo.owner.login }}
      - name: Run JVM Tests
        run: ./gradlew test

  javadoc:
    name: Javadoc Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name != 'pull_request' || github.repository_owner != github.event.pull_request.head.repo.owner.login }}
      - name: Build Javadoc
        run: ./gradlew javadoc

  native-test:
    name: Native Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name != 'pull_request' || github.repository_owner != github.event.pull_request.head.repo.owner.login }}
      - id: native-run # Small optimization to assume that metadata doesn't need to be updated.
        name: Run Tests in Native Image
        continue-on-error: true
        run: ./gradlew nativeTest
      - name: Run Tracing Agent (Fallback)
        if: steps.native-run.outcome == 'failure'
        run: ./gradlew -Pagent test
      - name: Copy Native Metadata (Fallback)
        if: steps.native-run.outcome == 'failure'
        run: ./gradlew metadataCopy
      - name: Run Tests in Native Image (Fallback)
        if: steps.native-run.outcome == 'failure'
        run: ./gradlew nativeTest

  binary-compatibility:
    name: Binary Compatibility
    if: |
      github.event_name != 'merge_group' &&
      !contains(github.event.pull_request.labels.*.name, 'breaking')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Base Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: baseline-repo
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name != 'pull_request' || github.repository_owner != github.event.pull_request.head.repo.owner.login }}
      - name: Build Base Branch Jars
        run: |
          cd baseline-repo
          ./gradlew jar
          mkdir -p ${{ runner.temp }}/baseline-libs
          find . -name "*.jar" -path "*/build/libs/*" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | while read -r jar_path; do
            proj_dir=$(echo "$jar_path" | sed 's|/build/libs/.*||')
            if [ "$proj_dir" = "." ]; then
              proj_name="minestom"
            else
              proj_name=$(basename "$proj_dir")
            fi
            cp "$jar_path" "${{ runner.temp }}/baseline-libs/${proj_name}.jar"
          done
      - name: Checkout PR Branch
        uses: actions/checkout@v6
      - name: Check Binary Compatibility
        run: ./gradlew checkBinaryCompatibility -PbaselineJarDir="${{ runner.temp }}/baseline-libs"

  publish:
    name: Publish PR
    needs: [build, javadoc, native-test, binary-compatibility]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.repository == 'Minestom/Minestom' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'Publish Pull Request') &&
      needs.build.result == 'success' &&
      needs.javadoc.result == 'success' &&
      needs.native-test.result == 'success' &&
      (needs.binary-compatibility.result == 'success' || needs.binary-compatibility.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - name: Run Tracing Agent # Sign quite annoying but if we need updated metadata we need it for publishing.
        run: ./gradlew -Pagent test
      - name: Copy Reachability Metadata
        run: ./gradlew metadataCopy
      - name: Publish Artifacts
        env:
          MINESTOM_VERSION: ${{ github.head_ref }}-SNAPSHOT
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}
        run: |
          ./gradlew nmcpPublishAggregationToCentralPortalSnapshots
          echo "Version: ${MINESTOM_VERSION}" >> $GITHUB_STEP_SUMMARY
